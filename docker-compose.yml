services:
  telemt:
    image: ghcr.io/telemt/telemt:latest   # официальный образ; можно закрепить тег релиза, напр. :3.3.28
    container_name: telemt
    restart: unless-stopped
    ports:
      - "443:443"                          # MTProto (клиенты подключаются сюда)
      - "127.0.0.1:9090:9090"              # метрики (только loopback)
      - "127.0.0.1:9091:9091"              # API (только loopback)
    working_dir: /etc/telemt
    volumes:
      - ./config.toml:/etc/telemt/config.toml:ro
    tmpfs:
      - /etc/telemt:rw,mode=1777,size=8m   # кэш proxy-secret и TLS-эмуляции в read-only контейнере
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "/app/telemt", "healthcheck", "/etc/telemt/config.toml", "--mode", "liveness"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    cap_drop: [ALL]
    cap_add: [NET_BIND_SERVICE]
    read_only: true
    security_opt: [no-new-privileges:true]
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "5" }
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
    # Для IPv6 раскомментируй host-сеть (по умолчанию bridge — обычно лучше):
    # network_mode: host
